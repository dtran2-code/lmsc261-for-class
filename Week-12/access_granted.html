<!doctype html>
<html lang="en">
    <head>
        <title>Security System</title>
        <style>
            body{
                font-family: "Courier New", Courier, monospace;
                text-align: center;
                padding: 50px;
                background-color: #1a1a1a;
                color: white;
            }
            .profile-card{
                border: 2px solid #ff4444;
                padding:20px;
                border-radius: 15px;
                display: inline-block;
            }
            .highlight{
                background-color: #00ff00;
            }

        </style>
    </head>
    <body>
        <div class="profile-card">
            <h1 id="status">Access Denied</h1>
            <p class="hackedStatus">Hacked by...Nobody</p>
        </div>

        <script>
            let accessGranted = document.getElementById("status");

            accessGranted.style.color = "green";
            accessGranted.textContent = "Access Granted";

            let hackedByDao = document.getElementsByClassName("hackedStatus")[0];

            hackedByDao.textContent = "Hacked by Dao";

        </script>
    </body>
</html>
